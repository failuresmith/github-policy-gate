name: self-test

on:
  pull_request:

permissions: {}

jobs:
  pass-case:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./
        with:
          github-token: ${{ github.token }}
          config-path: tests/fixtures/self-test/pass.yml

  fail-case:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - id: policy-gate
        continue-on-error: true
        uses: ./
        with:
          github-token: ${{ github.token }}
          config-path: tests/fixtures/self-test/fail.yml
      - if: steps.policy-gate.outcome != 'failure'
        run: |
          echo "Expected the failure fixture to fail."
          exit 1
